name: "fix — 버그 수정"
description: 잘못된 동작을 수정합니다
title: "[fix] "
labels: ["fix"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 증상
      description: 어떤 상황에서 무엇이 잘못 동작하는가?
      placeholder: "예: 이순신 문서 클릭 시 ArticleNotFoundError가 발생하고 화면이 빈 상태로 멈춤"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 재현 조건
      description: 최소 재현 케이스
      placeholder: |
        1. /render-demo 접속
        2. "이순신" 검색
        3. 문서 로드 실패
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 관련 코드
      description: 원인으로 의심되는 파일/라인
      placeholder: "src/lib/r2.ts:42 — fetchArticle 에러 처리"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 수정 후 어떤 동작이 보장되어야 하는가?
      placeholder: |
        - [ ] 해당 문서 정상 로드
        - [ ] 에러 발생 시 "문서를 불러올 수 없습니다" 안내 표시
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 탐색 시작점
      description: AI가 바로 읽어야 할 파일/라인. 원인 가설이 있으면 함께 작성
      placeholder: |
        - 참조: src/lib/r2.ts:42 — fetchArticle 에러 처리
        - 관련: src/pages/RenderDemoPage.tsx
    validations:
      required: true
