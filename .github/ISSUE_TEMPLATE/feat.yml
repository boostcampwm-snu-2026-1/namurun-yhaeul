name: "feat — 기능 구현"
description: 새로운 기능을 추가합니다
title: "[feat] "
labels: ["feat"]
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 기능이 필요한가? 어떤 문제를 해결하는가?
      placeholder: "예: 게임 중 경과 시간을 표시해야 하는데 타이머가 없음"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 구현 범위
      description: 어떤 파일/컴포넌트를 새로 만들거나 수정하는가?
      placeholder: |
        - 새로 생성: src/components/GameHeader.tsx, src/hooks/useTimer.ts
        - 수정: src/pages/GamePage.tsx
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 무엇이 충족되면 이 이슈가 완료인가?
      placeholder: |
        - [ ] 게임 시작 시 타이머가 0초부터 카운트 업
        - [ ] 목표 문서 도달 시 타이머 정지
        - [ ] 백그라운드 탭 전환 후 복귀해도 시간 유지
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 탐색 시작점
      description: AI가 바로 읽어야 할 파일/컴포넌트. 코드베이스 탐색 시간을 줄이기 위해 최대한 구체적으로 작성
      placeholder: |
        - 참조: docs/architecture.md, src/hooks/useGame.ts
        - 수정 예상: src/pages/GamePage.tsx
        - 신규 예상: src/components/GameHeader.tsx, src/hooks/useTimer.ts
    validations:
      required: true
